<title>factoryComment</title>
<text text-anchor="middle" x="897" y="-338.15" font-family="Times,serif" font-size="13.00" fill="#4d4d4d">Factories are the basic builder interferace,</text>
<text text-anchor="middle" x="897" y="-321.65" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> starting a fluent builder chain </text>
<text text-anchor="middle" x="897" y="-305.15" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> that can do everything.</text>
</g>
<!-- concreteBuilderComment&#45;&gt;factoryComment -->
<!-- structureComment -->
<g id="node16" class="node">
<title>structureComment</title>
<text text-anchor="middle" x="680" y="-41.15" font-family="Times,serif" font-size="13.00" fill="#4d4d4d">Structures are a common view on builders and assemblies.</text>
<text text-anchor="middle" x="680" y="-24.65" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> &#160;They can have VisAtts etc. set, hierarchical application </text>
<text text-anchor="middle" x="680" y="-8.15" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> of offset, &#160;rotation, and finally placement</text>
