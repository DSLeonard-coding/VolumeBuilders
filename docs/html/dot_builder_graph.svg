<!-- concreteBuilderComment -->
<g id="node15" class="node">
<title>concreteBuilderComment</title>
<text text-anchor="middle" x="861" y="-244.65" font-family="Times,serif" font-size="13.00" fill="#4d4d4d">Specialized builders are just what factories return.</text>
<text text-anchor="middle" x="861" y="-228.15" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> &#160;They do everything, solid configuration, boolean, </text>
<text text-anchor="middle" x="861" y="-211.65" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> transforms, logical construction, </text>
<text text-anchor="middle" x="861" y="-195.15" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> visAtts, ect, and placment</text>
</g>
<!-- builderComment&#45;&gt;concreteBuilderComment -->
