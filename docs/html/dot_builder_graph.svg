<!-- builderComment -->
<g id="node14" class="node">
<title>builderComment</title>
<text text-anchor="middle" x="861" y="-134.65" font-family="Times,serif" font-size="13.00" fill="#4d4d4d">VolumeBuilder allows operating on collections </text>
<text text-anchor="middle" x="861" y="-118.15" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> of different &#160;concrete builders. &#160;This view allows all </text>
<text text-anchor="middle" x="861" y="-101.65" font-family="Times,serif" font-size="13.00" fill="#4d4d4d"> operations except initial solid configuration.</text>
</g>
